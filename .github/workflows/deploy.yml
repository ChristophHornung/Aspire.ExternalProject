name: Deployment

on:
  workflow_dispatch:

jobs:
  deployment:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore --configuration Release
    - name: Test
      run: dotnet test --no-build --verbosity normal --configuration Release --filter FullyQualifiedName!~Example
    - name: Archive nuget-package artifact
      uses: actions/upload-artifact@v7
      with:
        name: nuget-package
        path: ${{ github.workspace }}/Chorn.Aspire.ExternalProject/bin/Release/*.nupkg
    - name: Push to NuGet
      run: dotnet nuget push ${{ github.workspace }}/Chorn.Aspire.ExternalProject/bin/Release/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}
